<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forstore BI Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e0e0e0; min-height: 100vh; }
.header { background: #1a1d27; border-bottom: 1px solid #2a2d3a; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.header h1 { font-size: 18px; font-weight: 600; color: #fff; }
.header p { font-size: 12px; color: #888; margin-top: 2px; }
.filters { background: #1a1d27; padding: 12px 24px; display: flex; gap: 8px; flex-wrap: wrap; border-bottom: 1px solid #2a2d3a; align-items: center; }
.filter-btn { background: #2a2d3a; border: 1px solid #3a3d4a; color: #aaa; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; transition: all 0.2s; }
.filter-btn:hover, .filter-btn.active { background: #4f46e5; border-color: #4f46e5; color: #fff; }
.date-inputs { display: flex; gap: 8px; align-items: center; }
.date-inputs input { background: #2a2d3a; border: 1px solid #3a3d4a; color: #e0e0e0; padding: 6px 10px; border-radius: 6px; font-size: 12px; }
.date-inputs button { background: #4f46e5; border: none; color: #fff; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; }
.container { padding: 20px 24px; max-width: 1400px; margin: 0 auto; }
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 20px; }
.kpi-card { background: #1a1d27; border: 1px solid #2a2d3a; border-radius: 10px; padding: 16px; }
.kpi-card .label { font-size: 11px; color: #888; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
.kpi-card .value { font-size: 26px; font-weight: 600; color: #fff; }
.kpi-card .value.green { color: #22c55e; }
.kpi-card .value.red { color: #ef4444; }
.charts-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 12px; margin-bottom: 20px; }
.charts-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
.chart-card { background: #1a1d27; border: 1px solid #2a2d3a; border-radius: 10px; padding: 16px; }
.chart-card h3 { font-size: 13px; font-weight: 500; color: #ccc; margin-bottom: 14px; }
.productos-list { display: flex; flex-direction: column; gap: 10px; }
.producto-item { display: flex; align-items: center; gap: 10px; }
.producto-rank { width: 22px; height: 22px; border-radius: 5px; background: #4f46e5; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: #fff; flex-shrink: 0; }
.producto-rank.r2,.producto-rank.r3,.producto-rank.r4,.producto-rank.r5 { background: #2a2d3a; color: #aaa; }
.producto-nombre { font-size: 12px; color: #ccc; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.producto-count { font-size: 12px; font-weight: 600; color: #fff; flex-shrink: 0; }
.costos-list { display: flex; flex-direction: column; gap: 12px; }
.costo-item .costo-header { display: flex; justify-content: space-between; margin-bottom: 4px; }
.costo-item .costo-label { font-size: 11px; color: #888; }
.costo-item .costo-valor { font-size: 11px; font-weight: 500; color: #ccc; }
.costo-bar { height: 4px; background: #2a2d3a; border-radius: 2px; }
.costo-bar-fill { height: 100%; border-radius: 2px; }
.updated { font-size: 11px; color: #555; text-align: center; padding: 16px; }
@media (max-width: 768px) { .charts-grid,.charts-grid-2 { grid-template-columns: 1fr; } .kpi-grid { grid-template-columns: repeat(2,1fr); } .container { padding: 12px; } }
</style>
</head>
<body>
<div class="header">
  <div><h1>Forstore BI</h1><p id="subtitle">Cargando...</p></div>
  <div style="font-size:11px;color:#555;">Actualizado: 30/3/2026, 4:15:29 a. m.</div>
</div>
<div class="filters">
  <button class="filter-btn active" onclick="filtrar('mes',this)">Este mes</button>
  <button class="filter-btn" onclick="filtrar('7dias',this)">Últimos 7 días</button>
  <button class="filter-btn" onclick="filtrar('15dias',this)">Últimos 15 días</button>
  <div class="date-inputs">
    <input type="date" id="fechaDesde">
    <span style="color:#555;font-size:12px;">→</span>
    <input type="date" id="fechaHasta">
    <button onclick="filtrar('personalizado',this)">Aplicar</button>
  </div>
</div>
<div class="container">
  <div class="kpi-grid" id="kpiGrid"></div>
  <div class="charts-grid">

    <div class="chart-card"><h3>Desglose de costos</h3><div class="costos-list" id="costosList"></div></div>
  </div>
  <div class="charts-grid-2">
    <div class="chart-card"><h3>Eficacia de entrega por día</h3><canvas id="chartEficacia" height="180"></canvas></div>
    <div class="chart-card"><h3>Top productos más vendidos</h3><div class="productos-list" id="productosList"></div></div>
  </div>
  <div class="charts-grid-2">
    <div class="chart-card"><h3>Pedidos por día</h3><canvas id="chartPedidos" height="180"></canvas></div>
    <div class="chart-card"><h3>COD cobrado vs Gasto Meta</h3><canvas id="chartCODMeta" height="180"></canvas></div>
  </div>
  <p class="updated">Forstore BI · Actualizado cada noche a las 8pm</p>
</div>

    '<div class="kpi-card"><div class="label">Pedidos período</div><div class="value">'+tPed+'</div></div>'+
    '<div class="kpi-card"><div class="label">Eficacia promedio</div><div class="value">'+tEfi+'%</div></div>'+
    '<div class="kpi-card"><div class="label">COD cobrado</div><div class="value">$'+tCOD.toFixed(0)+'</div></div>'+
    '<div class="kpi-card"><div class="label">Gasto Meta</div><div class="value">$'+tMeta.toFixed(0)+'</div></div>'+
    '<div class="kpi-card"><div class="label">Ingreso neto</div><div class="value '+ic+'">$'+tIng.toFixed(0)+'</div></div>';
  const tot=tMeta+(tCOD*0.295)+(tCOD*0.222)+(tCOD*0.025);
  const costos=[{l:'Gasto Meta',v:tMeta,c:'#7c3aed'},{l:'Costo envío',v:tCOD*0.295,c:'#2563eb'},{l:'Costo productos',v:tCOD*0.222,c:'#d97706'},{l:'Comisiones COD',v:tCOD*0.025,c:'#dc2626'}];
  document.getElementById('costosList').innerHTML=costos.map(x=>'<div class="costo-item"><div class="costo-header"><span class="costo-label">'+x.l+'</span><span class="costo-valor">$'+x.v.toFixed(0)+'</span></div><div class="costo-bar"><div class="costo-bar-fill" style="width:'+(tot>0?(x.v/tot*100).toFixed(0):0)+'%;background:'+x.c+'"></div></div></div>').join('');
  const ranks=['r1','r2','r3','r4','r5'];
  document.getElementById('productosList').innerHTML=TOP_PRODUCTOS.map((p,i)=>'<div class="producto-item"><div class="producto-rank '+ranks[i]+'">'+(i+1)+'</div><span class="producto-nombre">'+p[0]+'</span><span class="producto-count">'+p[1]+' uds</span></div>').join('');
  mkChart('chartIngresos','bar',d.fechas,[{data:d.ing,backgroundColor:colorIng(d.ing),borderRadius:4}]);
  mkChart('chartEficacia','bar',d.fechas,[{data:d.efi,backgroundColor:colorEfi(d.efi),borderRadius:4}],{scales:{...base.scales,y:{...base.scales.y,min:0,max:100,ticks:{...base.scales.y.ticks,callback:v=>v+'%'}}}});
  mkChart('chartPedidos','bar',d.fechas,[{data:d.ped,backgroundColor:'rgba(79,70,229,0.8)',borderRadius:4}]);
  mkChart('chartCODMeta','line',d.fechas,[{label:'COD cobrado',data:d.cod,borderColor:'#22c55e',backgroundColor:'rgba(34,197,94,0.1)',tension:0.4,fill:true},{label:'Gasto Meta',data:d.meta,borderColor:'#7c3aed',backgroundColor:'rgba(124,58,237,0.1)',tension:0.4,fill:true}],{plugins:{legend:{display:true,labels:{color:'#888',font:{size:11}}}},scales:base.scales});
  const fl={mes:'Este mes','7dias':'Últimos 7 días','15dias':'Últimos 15 días',personalizado:'Rango personalizado'};
  document.getElementById('subtitle').textContent=(fl[window.filtroActual]||'Este mes')+' · '+d.fechas.length+' días';
}
function filtrar(t,btn){window.filtroActual=t;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));if(btn)btn.classList.add('active');render();}
window.filtroActual='mes';render();
</script>
</body>
</html>
